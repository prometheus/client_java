oats: 2
name: http protobuf exporter emits uptime metric
fixture:
  type: compose
  template: lgtm
  compose_file: docker-compose.yml
seed:
  type: app
expected:
  custom-checks:
    - script: |
        set -eu
        python3 - <<'PY'
        import json, urllib.parse, urllib.request
        q = urllib.parse.quote('uptime_seconds_total{job="rolldice"}')
        with urllib.request.urlopen(f'http://localhost:9090/api/v1/query?query={q}') as r:
            data = json.load(r)
        result = data.get('data', {}).get('result', [])
        if not result:
            raise SystemExit('uptime_seconds_total missing from Prometheus')
        value = float(result[0]['value'][1])
        if value < 0:
            raise SystemExit(f'unexpected negative uptime metric: {value}')
        PY
