oats: 2
name: java agent exporter preserves target_info identity
fixture:
  type: compose
  template: lgtm
  compose_file: docker-compose.yml
seed:
  type: app
expected:
  custom-checks:
    - script: |
        set -eu
        python3 - <<'PY'
        import json, urllib.parse, urllib.request
        q = urllib.parse.quote('uptime_seconds_total{job="rolldice"}')
        with urllib.request.urlopen(f'http://localhost:9090/api/v1/query?query={q}') as r:
            uptime = json.load(r)
        result = uptime.get('data', {}).get('result', [])
        if not result:
            raise SystemExit('uptime_seconds_total missing from Prometheus')
        if float(result[0]['value'][1]) < 0:
            raise SystemExit('uptime_seconds_total must be >= 0')

        q = urllib.parse.quote('target_info{service_name!="otelcol-contrib"}')
        with urllib.request.urlopen(f'http://localhost:9090/api/v1/query?query={q}') as r:
            target_info = json.load(r)
        rows = target_info.get('data', {}).get('result', [])
        if len(rows) != 2:
            raise SystemExit(f'expected 2 non-collector target_info rows, got {len(rows)}')
        instances = {row['metric'].get('instance') for row in rows}
        if len(instances) != 1:
            raise SystemExit(f'expected one shared instance across target_info rows, got {sorted(instances)}')
        PY
